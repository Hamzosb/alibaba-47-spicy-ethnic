<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Edit your site</title>
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
  </head>
  <body>
    <!--
      OAuth fragment handler. Runs BEFORE Decap loads.

      Two ways the OAuth flow ends up here:
      1. Original tab — user clicks Login → popup completes OAuth → popup
         posts message back to this window (the opener). Decap handles it
         directly; this script doesn't fire.
      2. Popup tab — postMessage path failed (cross-origin opener isolated)
         so the proxy's /api/callback redirected the popup to this URL with
         the token in a fragment. We're now inside the popup, on the same
         origin as the admin route. Steps:
           a. Write the token to localStorage (Decap's auth source).
           b. If we're a popup with an opener still open, reload the opener
              (same-origin, so allowed) — it will auto-login from the shared
              localStorage on reload — then close ourselves.
           c. If standalone (no opener), just clear the fragment; Decap
              auto-logs-in in this tab.
    -->
    <script>
      (function () {
        var hash = window.location.hash || '';
        var tokenMatch = hash.match(/[#&]decap_token=([^&]+)/);
        var errorMatch = hash.match(/[#&]decap_oauth_error=([^&]+)/);

        if (tokenMatch) {
          var token = decodeURIComponent(tokenMatch[1]);
          var user = { token: token, backendName: 'github' };
          try {
            localStorage.setItem('decap-cms-user', JSON.stringify(user));
            localStorage.setItem('netlify-cms-user', JSON.stringify(user));
          } catch (_) {}

          // If we're a popup whose opener is still alive AND same-origin,
          // hand off to the opener and close ourselves.
          var openerOk = false;
          try {
            openerOk = !!(window.opener && !window.opener.closed
                          && window.opener.location && window.opener.location.origin === window.location.origin);
          } catch (_) { openerOk = false; }

          if (openerOk) {
            try { window.opener.location.reload(); } catch (_) {}
            // Give the reload a tick before closing this popup.
            setTimeout(function () { try { window.close(); } catch (_) {} }, 200);
            // Don't load Decap in this popup; we're closing.
            document.write('<p style="font-family:system-ui;margin:2rem">Logged in. You can close this window.</p>');
            return;
          }

          // Standalone mode: clean the URL; Decap will auto-login below.
          history.replaceState(null, '', window.location.pathname);
        } else if (errorMatch) {
          var msg = decodeURIComponent(errorMatch[1]);
          document.addEventListener('DOMContentLoaded', function () {
            var el = document.createElement('div');
            el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#b23a2e;color:#fff;padding:1rem;font-family:system-ui;z-index:9999;';
            el.textContent = 'OAuth error: ' + msg;
            document.body.appendChild(el);
          });
        }
      })();
    </script>

    <!-- Decap CMS bootstrap. Pinned to a specific version to avoid the
         unpkg redirect dance + transient 503s when caret-resolution races
         in the browser. Bump intentionally; do not auto-track latest. -->
    <script src="https://unpkg.com/decap-cms@3.12.2/dist/decap-cms.js"></script>
  </body>
</html>
